packages:
  - 'apps/*'
  - 'packages/*'
  - 'examples/react/router/*'
  - 'examples/react/start/*'
  - 'examples/solid/router/*'
  - 'examples/solid/start/*'

nodeLinker: hoisted

overrides:
  react: ^19.2.0
  react-dom: ^19.2.0
  '@types/react': ^19.0.0
  '@types/react-dom': ^19.0.0

catalog:
  '@biomejs/biome': ^2.5.0
  '@commitlint/cli': ^19.8.1
  '@commitlint/config-conventional': ^19.8.1
  '@commitlint/cz-commitlint': ^19.8.1
  commitizen: ^4.3.1
  husky: ^9.1.7
  lint-staged: ^15.5.2
  ultracite: ^7.6.3

allowBuilds:
  esbuild: true
  sharp: true
